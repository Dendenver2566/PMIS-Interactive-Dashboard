            --body-bg: #f0f6ff;

        * { box-sizing: border-box; }

            font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif;
            background: var(--body-bg);
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 3px rgba(37,99,235,0.07), 0 8px 24px rgba(37,99,235,0.04);
            border: 1px solid #e0ecff;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card:hover { box-shadow: 0 4px 24px rgba(37,99,235,0.12); transform: translateY(-1px); }

        .sidebar { background: linear-gradient(160deg, #dbeafe 0%, #e0f2fe 50%, #e8f4fd 100%); }

        .badge-num {
            width: 26px; height: 26px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            color: white; flex-shrink: 0;
        }

        .kpi-card {
            border-radius: 14px;
            padding: 16px 20px;
            background: white;
            border: 1px solid #e0ecff;
            box-shadow: 0 2px 8px rgba(37,99,235,0.06);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: all 0.2s;
        }
        .kpi-card:hover { background: #f0f6ff; border-color: #93c5fd; }

        .topic-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
        }

        .share-btn {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white; border: none; border-radius: 10px;
            padding: 8px 18px; font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
            transition: all 0.2s; font-family: inherit;
        }
        .share-btn:hover { background: linear-gradient(135deg, #1d4ed8, #0284c7); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.35); }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.45); backdrop-filter: blur(6px);
            z-index: 999; display: flex; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; border-radius: 20px; padding: 32px;
            width: 90%; max-width: 480px;
            box-shadow: 0 24px 64px rgba(37,99,235,0.18);
            border: 1px solid #e0ecff;
        }

        .filter-label {
            display: flex; align-items: flex-start; gap: 10px;
            cursor: pointer; padding: 8px 10px; border-radius: 10px;
            transition: background 0.15s;
        }
        .filter-label:hover { background: rgba(37,99,235,0.08); }

        .checkbox-box {
            width: 20px; height: 20px; border-radius: 6px; margin-top: 2px; flex-shrink: 0;
            border: 2px solid #93c5fd; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; background: white;
        }
        .checkbox-box.checked { background: linear-gradient(135deg,#2563eb,#38bdf8); border-color: #2563eb; }

        .header-grad {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 40%, #0ea5e9 100%);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeInUp 0.35s ease both; }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        thead th { background: #f0f6ff; color: #475569; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; position: sticky; top: 0; z-index: 1; }
        thead th:first-child { border-radius: 8px 0 0 8px; }
        thead th:last-child  { border-radius: 0 8px 8px 0; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover td { background: #f0f6ff; }
        tbody td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #374151; }

</head>

// ─── TOOLTIP ─────────────────────────────────────────────
const CustomTooltip = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length) return null;
    return (
        <div style={{ background:'white', border:'1px solid #dbeafe', borderRadius:12, padding:'10px 14px', boxShadow:'0 8px 24px rgba(37,99,235,0.12)' }}>
            <p style={{ fontWeight:700, color:'#1e3a8a', marginBottom:6, fontSize:13 }}>{label}</p>
            {payload.map((e, i) => (
                <p key={i} style={{ color: e.color, fontSize:12, margin:'2px 0' }}>
                    {e.name}: <strong>{FMT.format(e.value)}</strong>
                </p>
            ))}
        </div>
    );
};

// ─── SHARE MODAL ─────────────────────────────────────────
const ShareModal = ({ onClose }) => {
    const [copied, setCopied] = useState(false);
    const url = window.location.href;

    const copy = () => {
        navigator.clipboard.writeText(url).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        });
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
                
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                    <div>
                        <h3 style={{ fontWeight:800, fontSize:18 }}>แชร์ Dashboard</h3>
                        <p style={{ fontSize:13 }}>แชร์รายงาน</p>
                    </div>

                    <button onClick={onClose}>
                        <Ic.Close />
                    </button>
                </div>

                {/* ✅ FIX เอา ))} ออก */}
                <div style={{ display:'flex', gap:8 }}>
                    <div style={{ flex:1 }}>
                        {url}
                    </div>

                    <button onClick={copy}>
                        <Ic.Copy />
                        {copied ? '✓ คัดลอกแล้ว' : 'คัดลอก'}
                    </button>
                </div>

            </div>
        </div>
    );
};

                                    <SectionHeader num="7" title="การจ่ายเงินสงเคราะห์ผู้ประสบภัย" icon={Ic.Gift} color="#f59e0b" />
                                    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14 }}>
                                        {[
                                            { label:'อนุมัติจ่าย (ราย)', value:0, icon:'👤', color:'#1e40af', bg:'#eff6ff' },
                                            { label:'เงินชดเชย (ล้านบาท)', value:0, icon:'💰', color:'#0891b2',   bg:'#e0f7ff' },
                                            { label:'เงินดำรงชีพ (ล้านบาท)', value:0, icon:'🏠', color:'#059669', bg:'#ecfdf5' },
                                            { label:'เงินชดเชยรพหว่างพักรักษาตัวที่ รพ. (ล้านบาท)', value:0.612, icon:'🏥', 	 						     color:'#db2777', bg:'#fff0f6' },
                                        ].map((s,i) => (
                                            <div key={i} className="kpi-card" style={{ background:s.bg, borderColor:`${s.color}22` }}>
                                                <div style={{ fontSize:28, marginBottom:8 }}>{s.icon}</div>
                                                <div style={{ fontSize:11, color:'#64748b', marginBottom:6, fontWeight:500 }}>{s.label}</div>
                                                <div style={{ fontSize:34, fontWeight:900, color:s.color, lineHeight:1 }}>{s.value}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            </main>

            {showShare && <ShareModal onClose={() => setShowShare(false)} />}
        </div>
    );
};

const rootEl = document.getElementById('root');
if (ReactDOM.createRoot) {
    ReactDOM.createRoot(rootEl).render(<App />);
} else {
    ReactDOM.render(<App />, rootEl);
}
</script>
</body>
</html>
